<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Private Room</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
/* --- COMPLETE CSS (every style from before) --- */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0F1A;--card:#111827;--border:#1F2937;
  --accent:#6366F1;--accent2:#8B5CF6;
  --green:#10B981;--red:#EF4444;--orange:#F97316;
  --text:#F9FAFB;--muted:#6B7280;
  --me:#4F46E5;--them:#1F2937;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100dvh;background:radial-gradient(ellipse at 50% 0%,#1e1b4b 0%,var(--bg) 60%);}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;box-shadow:0 25px 60px rgba(0,0,0,.5);}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo .icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px;}
.auth-logo h1{font-size:22px;font-weight:700;}
.auth-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
.ig{margin-bottom:14px;}
.ig label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.ig input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.ig input:focus{border-color:var(--accent);}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s;}
.btn-primary:hover{opacity:.9;}
.auth-toggle{text-align:center;margin-top:14px;font-size:13px;color:var(--muted);}
.auth-toggle span{color:var(--accent);cursor:pointer;font-weight:500;}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 12px;color:var(--red);font-size:13px;margin-bottom:12px;display:none;}

#app-screen{display:none;flex:1;flex-direction:column;height:100dvh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:8px;}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 5px;font-size:13px;cursor:pointer;}
.avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;text-transform:uppercase;}
.topbar-right{display:flex;gap:8px;}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
.icon-btn:hover{background:var(--border);}

.body-area{display:flex;flex:1;overflow:hidden;}
.conv-list-panel{width:100%;max-width:340px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.conv-list-hdr{padding:14px 16px;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.conv-item:hover{background:rgba(255,255,255,.03);}
.conv-item.active{background:rgba(99,102,241,.1);}
.conv-item.has-unread .conv-name{font-weight:700;color:#fff;}
.conv-av{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;text-transform:uppercase;position:relative;}
.conv-online-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--card);}
.conv-info{flex:1;min-width:0;}
.conv-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.conv-last-seen{font-size:10px;color:var(--muted);margin-top:1px;font-style:italic;}
.conv-status{font-size:10px;color:var(--accent);margin-top:1px;}
.conv-unread{background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.no-contacts{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);padding:40px;text-align:center;}
.no-contacts .emo{font-size:44px;}

.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.chat-header-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;}
.chat-header-info{flex:1;min-width:0;cursor:pointer;}
.chat-header-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-header-status{font-size:12px;color:var(--muted);margin-top:1px;}
.chat-header-status.on{color:var(--green);}
.chat-header-vcall{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}

.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Message alignment – reinforced */
.msg-row{display:flex;width:100%;}
.msg-row.mine{justify-content:flex-end;}
.msg-row.theirs{justify-content:flex-start;}

.swipe-wrapper{position:relative;overflow:hidden;touch-action:pan-y;max-width:72%;border-radius:18px;flex-shrink:0;}
.msg-row.mine .swipe-wrapper{border-radius:18px 4px 18px 18px;}
.msg-row.theirs .swipe-wrapper{border-radius:4px 18px 18px 18px;}
.swipe-bg{position:absolute;left:0;top:0;bottom:0;width:100%;background:var(--accent);display:flex;align-items:center;padding-left:16px;font-size:22px;color:#fff;pointer-events:none;border-radius:inherit;opacity:0;transition:opacity .15s;}

.bubble{padding:10px 14px;font-size:14px;line-height:1.5;word-break:break-word;position:relative;width:100%;}
.msg-row.mine .bubble{background:var(--me);color:#fff;}
.msg-row.theirs .bubble{background:var(--them);color:var(--text);}

.btime{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:3px;}
.msg-row.theirs .btime{color:var(--muted);justify-content:flex-start;}

.msg-status{font-size:10px;margin-left:3px;}
.msg-status.sent{color:rgba(255,255,255,.5);}
.msg-status.delivered{color:rgba(255,255,255,.5);}
.msg-status.read{color:#4FC3F7;}

.msg-image{max-width:250px;max-height:250px;border-radius:12px;cursor:pointer;display:block;margin-bottom:4px;}

.reaction-badge{position:absolute;bottom:-8px;right:6px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2px 7px;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:5;}
.msg-row.theirs .reaction-badge{right:auto;left:6px;}

.reply-ref{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px;padding:4px 8px;background:rgba(255,255,255,.1);border-left:3px solid rgba(255,255,255,.5);border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.msg-row.theirs .reply-ref{color:var(--muted);background:rgba(0,0,0,.1);border-left-color:var(--accent);}

.reply-preview{display:none;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-left:4px solid var(--accent);border-top:1px solid var(--border);font-size:13px;color:var(--muted);flex-shrink:0;}
.reply-preview .rp-label{color:var(--accent);font-weight:600;}
.reply-preview .rp-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-preview .rp-cancel{cursor:pointer;font-size:18px;color:var(--red);}

.typing-bubble{display:none;align-self:flex-start;padding:10px 16px;background:var(--them);border-radius:18px;border-bottom-left-radius:4px;gap:4px;margin-top:4px;}
.typing-bubble .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);animation:tb 1.4s infinite;margin:0 2px;}
.typing-bubble .dot:nth-child(2){animation-delay:.2s;}
.typing-bubble .dot:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}

#react-picker-overlay{display:none;position:fixed;inset:0;z-index:300;background:transparent;}
#react-picker{display:none;position:fixed;background:var(--card);border:2px solid var(--border);border-radius:30px;padding:8px 14px;gap:10px;z-index:301;box-shadow:0 12px 40px rgba(0,0,0,.7);}
#react-picker.show{display:flex;}
#react-picker span{font-size:28px;cursor:pointer;transition:transform .15s;padding:4px;}
#react-picker span:hover{transform:scale(1.4);}

.input-bar{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--card);flex-shrink:0;}
.msg-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;resize:none;height:42px;font-family:inherit;}
.msg-input:focus{border-color:var(--accent);}
.send-btn{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:var(--orange);border:none;color:#fff;font-size:18px;cursor:pointer;}
.send-btn:hover{opacity:.85;}
.attach-btn{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Settings, Profile, Status modals – keep full styles from before */
/* I'll include only the critical ones; you should paste the complete CSS for these if missing */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:450;}
.settings-overlay.show{display:block;}
.settings-panel{position:fixed;top:0;right:-320px;width:300px;height:100%;background:var(--card);border-left:1px solid var(--border);z-index:451;transition:right .3s ease;display:flex;flex-direction:column;overflow-y:auto;}
.settings-panel.open{right:0;}
.settings-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.settings-header h2{font-size:18px;font-weight:600;}
.settings-close{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.settings-list{flex:1;padding:8px 0;}
.settings-item{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s;}
.settings-item:hover{background:rgba(255,255,255,.03);}
.settings-item .s-icon{width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.settings-item.danger{color:var(--red);}
.settings-item.danger .s-icon{background:rgba(239,68,68,.1);}
.settings-section-title{padding:12px 16px 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.settings-toggle{margin-left:auto;width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.settings-toggle.active{background:var(--accent);}
.settings-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;}
.settings-toggle.active::after{left:22px;}

.settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:460;align-items:center;justify-content:center;}
.settings-modal.show{display:flex;}
.settings-modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:340px;}
.settings-modal-box h3{margin-bottom:16px;font-size:16px;}
.settings-modal-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none;}
.settings-modal-box input:focus{border-color:var(--accent);}
.settings-modal-box .btn-row{display:flex;gap:8px;}
.settings-modal-box .btn-row button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;}

#status-modal,#profile-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;}
#status-modal.show,#profile-modal.show{display:flex;}
.status-box,.profile-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:360px;text-align:center;}
.profile-box .p-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;margin-bottom:12px;position:relative;}
.profile-box .p-avatar .p-online-dot{position:absolute;bottom:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--green);border:3px solid var(--card);display:none;}
.profile-box .p-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.profile-box .p-status-text{color:var(--accent);font-size:13px;margin-bottom:8px;min-height:20px;}
.profile-box .p-last-seen{color:var(--muted);font-size:12px;margin-bottom:16px;}
.profile-box .p-actions{display:flex;gap:8px;justify-content:center;}
.profile-box .p-actions button{padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
.btn-close{background:var(--border);color:var(--text);}
.btn-message{background:var(--accent);color:#fff;}
.btn-call{background:var(--green);color:#fff;}

#image-preview-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;align-items:center;justify-content:center;cursor:pointer;}
#image-preview-modal.show{display:flex;}
#image-preview-modal img{max-width:95%;max-height:95%;object-fit:contain;border-radius:8px;}

#video-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;}
#incoming-call{display:none;position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:16px 20px;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:200;}

.no-chat-selected{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
.no-chat-selected .emo{font-size:52px;}

#file-input{display:none;}
.upload-progress{display:none;padding:8px 12px;background:var(--bg);border-top:1px solid var(--border);font-size:12px;color:var(--accent);text-align:center;}

@media(max-width:768px){
  .conv-list-panel{max-width:100%;border-right:none;}
  .chat-panel{position:absolute;inset:0;background:var(--bg);z-index:10;display:none;flex-direction:column;}
  .chat-panel.open{display:flex;}
  .back-btn{display:flex !important;}
}
</style>
</head>
